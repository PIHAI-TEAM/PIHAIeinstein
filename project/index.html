<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einstein Avatar Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <h1>Talk to Einstein</h1>
        
        <div class="video-wrapper">
            <!-- The video player for the avatar -->
            <video id="einstein-video" autoplay muted loop playsinline>
                <source id="video-src" src="assets/videos/idle.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <!-- Hidden audio player for voice lines -->
            <audio id="einstein-audio"></audio>
        </div>

        <div class="controls">
            <button id="start-btn">Start Program</button>
            <input type="text" id="text-input" placeholder="Or type your question here...">
            <button id="send-btn">Ask</button>
            <p id="status-text">Click "Start" to begin.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
